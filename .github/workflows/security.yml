name: Security

on:
  push:
    branches: [ main]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 3 * * 1'

permissions:
  contents: read
  security-events: write
  issues: write
  pull-requests: write

jobs:

  dependency-review:
    name: Dependency Review software compostion analysis
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high


  sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: TeaShop
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install CycloneDX
        run: dotnet tool install --global CycloneDX

      - name: Generate SBOM
        run: dotnet-CycloneDX TeaShop.slnx -o sbom --output-format Json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: TeaShop/sbom/


  dynamic_analysis:
    name: OWASP ZAP Scan
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        working-directory: TeaShop
        run: dotnet restore TeaShop/TeaShop.csproj

      - name: Build application
        working-directory: TeaShop
        run: dotnet build TeaShop/TeaShop.csproj --no-restore


      - name: Start API
        working-directory: TeaShop
        env:
          ASPNETCORE_ENVIRONMENT: CI
        run: |
          nohup dotnet run --project TeaShop/TeaShop.csproj \
            --urls "http://0.0.0.0:8080" \
            > app.log 2>&1 &


      - name: Wait for API
        run: |
          for i in {1..40}; do
            if curl -s http://localhost:8080 > /dev/null; then
              echo "API is up!"
              exit 0
            fi
            echo "Waiting for API... ($i)"
            sleep 3
          done

          echo "API failed to start"
          exit 1


      - name: Fix workspace permissions
        run: chmod -R 777 ${{ github.workspace }}

      - name: Run OWASP ZAP API Scan
        uses: zaproxy/action-api-scan@v0.9.0
        with:
            token: ${{ secrets.GITHUB_TOKEN }}
            target: 'http://localhost:8080/openapi/v1.json'
            format: openapi
            artifact_name: 'zap-api-report'
            fail_action: false


  artifact-scanning:
    name: Artifact Scanning
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: TeaShop

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore TeaShop.slnx

      - name: Publish Release build
        run: |
          dotnet publish TeaShop/TeaShop.csproj \
            -c Release \
            --self-contained false \
            -o ./publish


      - name: Trivy - Scan published artifact
        uses: aquasecurity/trivy-action@v0.70.0
        with:
          scan-type: fs
          scan-ref: TeaShop/publish
          scanners: vuln,secret
          severity: HIGH,CRITICAL
          exit-code: '1'
          format: sarif
          output: trivy-artifact.sarif

      - name: Upload Trivy artifact results to Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-artifact.sarif
          category: trivy-artifact



